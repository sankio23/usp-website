<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" role="img" aria-label="Two mirrored fields meeting at an axis">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#000000"/><stop offset="100%" stop-color="#000000"/></linearGradient>
    <linearGradient id="lft" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#cfd2da"/><stop offset="100%" stop-color="#cfd2da" stop-opacity="0"/></linearGradient>
    <linearGradient id="rgt" x1="1" y1="0" x2="0" y2="0"><stop offset="0%" stop-color="#9aa0aa"/><stop offset="100%" stop-color="#9aa0aa" stop-opacity="0"/></linearGradient>
    <filter id="g2"><feGaussianBlur stdDeviation="3"/></filter>
  </defs>
  <rect width="800" height="450" fill="url(#bg2)"/>
  <g stroke-width="2.4" fill="none" filter="url(#g2)">
    <path d="M400 60 C 180 120, 180 330, 400 390" stroke="url(#lft)"/>
    <path d="M400 60 C 620 120, 620 330, 400 390" stroke="url(#rgt)"/>
    <path d="M400 100 C 230 150, 230 300, 400 350" stroke="url(#lft)" opacity=".7"/>
    <path d="M400 100 C 570 150, 570 300, 400 350" stroke="url(#rgt)" opacity=".7"/>
    <path d="M400 140 C 280 175, 280 275, 400 310" stroke="url(#lft)" opacity=".5"/>
    <path d="M400 140 C 520 175, 520 275, 400 310" stroke="url(#rgt)" opacity=".5"/>
  </g>
  <line x1="400" y1="40" x2="400" y2="410" stroke="#ffffff" stroke-width="2" stroke-dasharray="2 8" opacity=".8"/>
  <circle cx="400" cy="225" r="9" fill="#ffffff"/>
  <circle cx="400" cy="225" r="18" fill="none" stroke="#ffffff" stroke-width="1.5" opacity=".6"/>
  <circle cx="400" cy="60" r="5" fill="#cfd2da"/><circle cx="400" cy="390" r="5" fill="#9aa0aa"/>
</svg>
