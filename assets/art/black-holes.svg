<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" role="img" aria-label="Black hole with accretion disk">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="75%"><stop offset="0%" stop-color="#000000"/><stop offset="100%" stop-color="#000000"/></radialGradient>
    <linearGradient id="disk" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#ffffff"/><stop offset="50%" stop-color="#dddddd"/><stop offset="100%" stop-color="#9aa0aa"/></linearGradient>
    <radialGradient id="hole" cx="50%" cy="50%" r="50%"><stop offset="60%" stop-color="#000"/><stop offset="92%" stop-color="#000"/><stop offset="100%" stop-color="#0a0a0a"/></radialGradient>
    <filter id="g"><feGaussianBlur stdDeviation="6"/></filter>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <g fill="#fff"><circle cx="90" cy="70" r="1.6" opacity=".8"/><circle cx="180" cy="120" r="1" opacity=".5"/><circle cx="700" cy="80" r="1.8" opacity=".8"/><circle cx="640" cy="180" r="1" opacity=".5"/><circle cx="120" cy="360" r="1.3" opacity=".6"/><circle cx="730" cy="370" r="1.2" opacity=".6"/><circle cx="400" cy="40" r="1" opacity=".5"/></g>
  <g transform="translate(400 225) rotate(-22)">
    <ellipse cx="0" cy="0" rx="250" ry="78" fill="none" stroke="url(#disk)" stroke-width="34" opacity=".35" filter="url(#g)"/>
    <ellipse cx="0" cy="0" rx="250" ry="78" fill="none" stroke="url(#disk)" stroke-width="14"/>
    <ellipse cx="0" cy="0" rx="250" ry="78" fill="none" stroke="#fff" stroke-width="2" opacity=".5"/>
  </g>
  <circle cx="400" cy="225" r="92" fill="url(#hole)"/>
  <circle cx="400" cy="225" r="96" fill="none" stroke="#ffffff" stroke-width="2.5" opacity=".85" filter="url(#g)"/>
  <circle cx="400" cy="225" r="96" fill="none" stroke="#fff" stroke-width="1.4" opacity=".7"/>
</svg>
